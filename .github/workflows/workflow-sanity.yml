name: Workflow Sanity

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: workflow-sanity-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  no-tabs:
    if: github.event_name != 'workflow_dispatch'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fail on tabs in workflow files
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import pathlib
          import sys

          root = pathlib.Path(".github/workflows")
          bad: list[str] = []
          for path in sorted(root.rglob("*.yml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          for path in sorted(root.rglob("*.yaml")):
            if b"\t" in path.read_bytes():
              bad.append(str(path))

          if bad:
            print("Tabs found in workflow file(s):")
            for path in bad:
              print(f"- {path}")
            sys.exit(1)
          PY

  actionlint:
    if: github.event_name != 'workflow_dispatch'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.11"
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64)
              archive="actionlint_${ACTIONLINT_VERSION}_darwin_arm64.tar.gz"
              ;;
            Linux-x86_64)
              archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
              ;;
            *)
              echo "::error::Unsupported runner platform for actionlint: $(uname -s)-$(uname -m)"
              exit 1
              ;;
          esac
          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl -sSfL -o "${archive}" "${base_url}/${archive}"
          curl -sSfL -o checksums.txt "${base_url}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          checksum="$(grep " ${archive}\$" checksums.txt | awk '{print $1}')"
          if command -v shasum >/dev/null 2>&1; then
            printf '%s  %s\n' "$checksum" "$archive" | shasum -a 256 -c -
          else
            printf '%s  %s\n' "$checksum" "$archive" | sha256sum -c -
          fi
          tar -xzf "${archive}" actionlint
          install_dir="$RUNNER_TEMP/actionlint-bin"
          mkdir -p "$install_dir"
          install -m 0755 actionlint "$install_dir/actionlint"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: actionlint

      - name: Disallow direct inputs interpolation in composite run blocks
        run: python3 scripts/check-composite-action-input-interpolation.py

  config-docs-drift:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Check config docs drift statefile
        run: pnpm config:docs:check
