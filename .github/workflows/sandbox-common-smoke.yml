name: Sandbox Common Smoke

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.sandbox
      - Dockerfile.sandbox-common
      - scripts/sandbox-common-setup.sh
  pull_request:
    paths:
      - Dockerfile.sandbox
      - Dockerfile.sandbox-common
      - scripts/sandbox-common-setup.sh

concurrency:
  group: sandbox-common-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sandbox-common-smoke:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Verify Docker availability
        id: docker
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::docker CLI is unavailable; skipping sandbox-common-smoke."
            exit 0
          fi
          if docker version >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Docker daemon is unavailable; skipping sandbox-common-smoke."
          fi

      - name: Set up Docker Builder
        if: steps.docker.outputs.available == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build minimal sandbox base (USER sandbox)
        if: steps.docker.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker build -t openclaw-sandbox-smoke-base:bookworm-slim - <<'EOF'
          FROM debian:bookworm-slim
          RUN useradd --create-home --shell /bin/bash sandbox
          USER sandbox
          WORKDIR /home/sandbox
          EOF

      - name: Build sandbox-common image (root for installs, sandbox at runtime)
        if: steps.docker.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail

          BASE_IMAGE="openclaw-sandbox-smoke-base:bookworm-slim" \
            TARGET_IMAGE="openclaw-sandbox-common-smoke:bookworm-slim" \
            PACKAGES="ca-certificates" \
            INSTALL_PNPM=0 \
            INSTALL_BUN=0 \
            INSTALL_BREW=0 \
            FINAL_USER=sandbox \
            scripts/sandbox-common-setup.sh

          u="$(docker run --rm openclaw-sandbox-common-smoke:bookworm-slim sh -lc 'id -un')"
          test "$u" = "sandbox"

      - name: Mark smoke as skipped when Docker unavailable
        if: steps.docker.outputs.available != 'true'
        run: echo "Skipping sandbox-common-smoke because Docker is unavailable on this self-hosted runner."
